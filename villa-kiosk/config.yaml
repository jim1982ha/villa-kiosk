# Villa Kiosk — Home Assistant add-on manifest (image-pull variant).
#
# `image` makes the Supervisor PULL a prebuilt image from GHCR instead of
# building on the device, so installing from the repository URL is a one-click,
# no-compile operation. The {arch} placeholder + version resolve to e.g.
# ghcr.io/jim1982ha/villa-kiosk-amd64:2.0.0 — published by .github/workflows/build.yaml.
name: Villa Kiosk
version: "2.4.22"
slug: villa_kiosk
description: 3D Home Assistant villa dashboard served through Ingress
url: https://github.com/jim1982ha/villa-kiosk
image: ghcr.io/jim1982ha/villa-kiosk-{arch}
arch:
  - amd64
  - aarch64
# The HA base image ships s6-overlay v3 as its own init — disable Docker's.
init: false
# Serve in the sidebar through Ingress (no exposed port, HA does the auth).
ingress: true
ingress_port: 8099
# Grants the add-on the Supervisor Core API proxy + SUPERVISOR_TOKEN, so the UI
# talks to Home Assistant token-lessly (no long-lived token needed). See
# rootfs/usr/bin/supervisor-proxy.py.
homeassistant_api: true
panel_icon: mdi:home-city
panel_title: Villa Kiosk
boot: auto
startup: application
# Central 3D model configuration — set these paths once in the add-on settings
# so ALL clients load the same model automatically (no per-browser upload needed).
# Paths are relative to the HA www folder, e.g. "villa-kiosk/villa.glb".
options:
  model_path: ""
  sh3d_path: ""
schema:
  model_path: str?
  sh3d_path: str?
# Mount the HA config directory read-only so the add-on can serve model files
# from /config/www/ directly via nginx (clients fetch /model/{path}).
map:
  - homeassistant_config:ro
