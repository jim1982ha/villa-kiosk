# Serves the static Villa Kiosk build on the Ingress port. Only the Home
# Assistant Ingress gateway (172.30.32.2) is allowed; everything else is denied.
worker_processes 1;
pid /run/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  access_log    /dev/stdout;

  sendfile      on;
  tcp_nodelay   on;
  keepalive_timeout 65;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  server {
    listen 8099 default_server;
    server_name _;

    # Ingress gateway only — reject any direct/host access.
    allow 172.30.32.2;
    deny all;

    root  /var/www;
    index index.html;

    # Vite emits content-hashed files under /assets — cache them hard.
    location /assets/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # Relative base + HashRouter means this fallback is rarely hit, but it keeps
    # any stray deep link resolving to the app shell.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
