# Serves the static Villa Kiosk build on the Ingress port. Only the Home
# Assistant Ingress gateway (172.30.32.2) is allowed; everything else is denied.
# `/core/` is forwarded to the local Supervisor proxy (supervisor-proxy.py),
# which injects the add-on's SUPERVISOR_TOKEN so the browser stays token-less.
worker_processes 1;
pid /run/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  access_log    /dev/stdout;

  sendfile      on;
  tcp_nodelay   on;
  keepalive_timeout 65;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # Toggle the Connection header for WebSocket upgrades.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 8099 default_server;
    server_name _;

    # Ingress gateway only — reject any direct/host access.
    allow 172.30.32.2;
    deny all;

    root  /var/www;
    index index.html;

    # Home Assistant Core API + websocket, via the token-injecting proxy.
    location /core/ {
      proxy_pass http://127.0.0.1:8100;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      # MJPEG camera streams + the websocket must not be buffered.
      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Vite emits content-hashed files under /assets — cache them hard.
    location /assets/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # Add-on options (model_path, sh3d_path) for the frontend.
    # Served by the supervisor-proxy so it can read /data/options.json.
    location = /addon-config {
      proxy_pass http://127.0.0.1:8100/addon-config;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # Central 3D model files served from the HA www folder.
    # The homeassistant_config:ro map mounts /config/www → /homeassistant/www.
    # Example: admin puts villa.glb in /config/www/villa-kiosk/ and sets
    #          model_path=villa-kiosk/villa.glb in the add-on options.
    location /model/ {
      alias /homeassistant/www/;
      expires 1h;
      add_header Cache-Control "public, max-age=3600";
      try_files $uri =404;
    }

    # Relative base + HashRouter means this fallback is rarely hit, but it keeps
    # any stray deep link resolving to the app shell.
    #
    # index.html is the ONLY unhashed file we serve: it references the
    # content-hashed /assets/index-*.js|css. Without a Cache-Control header
    # browsers/proxies (and the Nabu Casa / DuckDNS edge) apply heuristic
    # caching and keep serving a stale shell after an add-on update — so the
    # page loads OLD asset hashes and the UI never refreshes even though the
    # new build is on disk. Force revalidation of the shell on every load;
    # the hashed assets it pulls in stay immutable-cached (see /assets/).
    location / {
      add_header Cache-Control "no-cache";
      try_files $uri $uri/ /index.html;
    }
  }
}
