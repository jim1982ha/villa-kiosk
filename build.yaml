# Per-architecture base image for the runtime stage. The Supervisor substitutes
# the matching entry into the Dockerfile's BUILD_FROM ARG at build time.
build_from:
  amd64: ghcr.io/home-assistant/amd64-base:latest
  aarch64: ghcr.io/home-assistant/aarch64-base:latest
  armv7: ghcr.io/home-assistant/armv7-base:latest
