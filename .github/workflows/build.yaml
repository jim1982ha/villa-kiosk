name: Build & publish add-on images

# Publishes per-arch images to GHCR so the add-on installs by image pull (no
# on-device build). Runs on pushes that touch the app/add-on, and on demand.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig.json"
      - "Dockerfile"
      - "rootfs/**"
      - "villa-kiosk/config.yaml"
      - ".github/workflows/build.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read add-on version
        id: meta
        run: |
          version=$(grep -E '^version:' villa-kiosk/config.yaml | head -1 | sed -E 's/.*version:[[:space:]]*"?([^"]+)"?.*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner}/villa-kiosk-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      # QEMU lets the arm64 runtime stage build on this amd64 runner. The heavy
      # npm/Babylon build stage is pinned to BUILDPLATFORM in the Dockerfile, so
      # it stays native and fast — only the light nginx layer is emulated.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:latest
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            io.hass.version=${{ steps.meta.outputs.version }}
            io.hass.arch=${{ matrix.arch }}
            io.hass.type=addon
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max
