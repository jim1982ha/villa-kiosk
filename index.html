<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1c140c" />
    <meta name="application-name" content="Villa Kiosk" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Villa Kiosk" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <!-- use-credentials: when the app is served behind an HTTP Basic Auth gate
         (e.g. an NGINX Proxy Manager Access List), the browser fetches the
         manifest and its icons WITHOUT credentials by default, gets a 401, and
         silently treats the app as non-installable (no "Install app" link).
         use-credentials sends the cached Basic Auth so the manifest loads. -->
    <link rel="manifest" href="./manifest.json" crossorigin="use-credentials" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon-180.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@200;400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Villa Kiosk</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
